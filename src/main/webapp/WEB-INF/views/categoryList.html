<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>카테고리</title>
</head>
<body>
    <header>
        <p th:text="${'실습 수행 일시 : ' + #temporals.format(#temporals.createNow(), 'yyyy년 MM월 dd일 (E) a HH:mm:ss | 학번 : 1971293 | 이름 : 장원준')}"></p>
    </header>
    <h1>카테고리 목록</h1>
    <!-- categoryList.html : 성공/오류 Flash 메시지 표시 -->
    <p th:if="${successMessage}" th:text="${successMessage}"></p>
    <p th:if="${errorMessage}" th:text="${errorMessage}"></p>
    <form th:action="@{/categories/create}" method="get">
        <button type="submit">카테고리 등록</button>
    </form>
    <form th:action="@{/products}" method="get">
        <button type="submit">상품 목록으로 이동</button>
    </form>
    <!-- th:each로 목록 반복, 삭제는 POST 폼으로 처리 -->
    <tr th:each="cat : ${categories}">
        <td th:text="${cat.id}"></td>
        <td th:text="${cat.name}"></td>
        <td>
            <!-- th:action에서 경로 변수 (id=${cat.id}) 바인딩 방법 -->
            <form th:action="@{/categories/{id}/delete(id=${cat.id})}" method="post">
                <button type="submit">삭제</button>
            </form>
        </td>
    </tr>

</body>
</html>
